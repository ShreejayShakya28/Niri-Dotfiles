############################################
# SHELL CONFIGURATION
############################################
set -g default-shell /usr/bin/zsh
set -g default-command /usr/bin/zsh

############################################
# PREFIX KEY
############################################
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

############################################
# GENERAL SETTINGS
############################################
set -g mouse on
set -g default-terminal "tmux-256color"
set -g set-clipboard on
set -g mode-keys vi

############################################
# WINDOW & PANE NUMBERING
############################################
# Start window numbering from 1
set -g base-index 1
# Start pane numbering from 1
set -g pane-base-index 1
# Renumber windows when one is closed
set -g renumber-windows on
# Show pane numbers temporarily
bind-key q display-panes

############################################
# WINDOW SPLITTING
############################################
# Split in the same working directory (default bindings)
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

############################################
# CONFIG RELOAD
############################################
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded!"

############################################
# NAVIGATION (prefix + h/j/k/l)
############################################
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Move between windows using Alt+h/l
bind -n M-h previous-window
bind -n M-l next-window

############################################
# COPY MODE
############################################
# Enter selection mode with 'v'
bind-key -T copy-mode-vi v send -X begin-selection
# Yank selection with 'y' and copy to system clipboard
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
# Copy on mouse drag end
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"

############################################
# STATUS BAR
############################################
set -g status-position bottom
set -g status-interval 5

############################################
# TOKYO NIGHT THEME OPTIONS
############################################
set -g @tokyo-night-style 'day'   # night | storm | moon | day
set -g @tokyo-night-transparent 'true'

############################################
# PLUGIN OPTIONS
############################################
# Auto-restore tmux sessions on start
set -g @continuum-restore 'on'
# Auto-save sessions every 15 minutes
set -g @continuum-save-interval '15'

############################################
# PLUGINS
############################################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

############################################
# TPM INITIALIZATION (MUST BE LAST)
############################################
run '~/.tmux/plugins/tpm/tpm'
